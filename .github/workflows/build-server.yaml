# build.yml
on:
  # pull_request:
  #   paths:
  #   - desci-server/**
  push:
    paths:
      - .github/workflows/**
      - desci-server/**
      - desci-contracts/**
      - integrationTestRunner.sh
      - docker-compose.test.yml
    branches: # array of glob patterns matching against refs/heads. Optional; defaults to all
      - main # triggers on pushes that contain changes
      - develop
      - demo

name: Build desci-server

# https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-envvars.html
env:
  AWS_DEFAULT_REGION: us-east-2
  AWS_DEFAULT_OUTPUT: json
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  CONTAINER_IMAGE: desci-server
  DOCKER_BUILDKIT: 1

jobs:
  build-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2204

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up node
        uses: useblacksmith/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          check-latest: false
          cache: "yarn"
          cache-dependency-path: |
            desci-server/yarn.lock

      # Enable blacksmith docker layer caching
      #- uses: useblacksmith/setup-docker-builder@v1

      - name: Install dependencies (desci-server)
        working-directory: desci-server
        run: yarn install --ignore-engines --frozen-lockfile

      - name: Run tests
        run: |
          SKIP_NODES_LIB=1 ./integrationTestRunner.sh

  build-and-push-images:
    # we build and push for every commit, even if tests pass, that way when tests pass deployment is short (run test + build in parallel)
    name: Build and push images
    runs-on: blacksmith-4vcpu-ubuntu-2204
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: image-tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)-$(date +%s)" >> $GITHUB_OUTPUT

      # Enable blacksmith docker layer caching
      #- uses: useblacksmith/setup-docker-builder@v1

      - name: Build and tag the image (DEV)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            --secret id=SENTRY_AUTH_TOKEN \
            -f desci-server/Dockerfile.ci \
            -t $CONTAINER_IMAGE-dev:${{ github.sha }} \
            -t $CONTAINER_IMAGE-dev:${{ steps.image-tag.outputs.tag }} \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-dev \
             ./desci-server

      - name: Build and tag the image (DEMO)
        if: github.ref == 'refs/heads/demo'
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            --secret id=SENTRY_AUTH_TOKEN \
            -f desci-server/Dockerfile.ci \
            -t $CONTAINER_IMAGE-demo:${{ github.sha }} \
            -t $CONTAINER_IMAGE-demo:${{ steps.image-tag.outputs.tag }} \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-demo \
             ./desci-server

      - name: Build and tag the image (PROD)
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            --secret id=SENTRY_AUTH_TOKEN \
            -f desci-server/Dockerfile.ci \
            -t $CONTAINER_IMAGE:${{ github.sha }} \
            -t $CONTAINER_IMAGE:${{ steps.image-tag.outputs.tag }} \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE \
             ./desci-server

      - name: Push (DEV)
        if: github.ref == 'refs/heads/develop'
        run: |
          # Push image to AWS ECR
          aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
          docker tag $CONTAINER_IMAGE-dev:${{ github.sha }} $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-dev:${{ github.sha }}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-dev:${{ github.sha }}
          docker tag $CONTAINER_IMAGE-dev:${{ steps.image-tag.outputs.tag }} $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-dev:${{ steps.image-tag.outputs.tag }}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-dev:${{ steps.image-tag.outputs.tag }}

      - name: Push (DEMO)
        if: github.ref == 'refs/heads/demo'
        run: |
          # Push image to AWS ECR
          aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
          docker tag $CONTAINER_IMAGE-demo:${{ github.sha }} $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-demo:${{ github.sha }}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-demo:${{ github.sha }}
          docker tag $CONTAINER_IMAGE-demo:${{ steps.image-tag.outputs.tag }} $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-demo:${{ steps.image-tag.outputs.tag }}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE-demo:${{ steps.image-tag.outputs.tag }}

      - name: Push (PROD)
        if: github.ref == 'refs/heads/main'
        run: |
          # Push image to AWS ECR
          aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
          docker tag $CONTAINER_IMAGE:${{ github.sha }} $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE:${{ github.sha }}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE:${{ github.sha }}
          docker tag $CONTAINER_IMAGE:${{ steps.image-tag.outputs.tag }} $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE:${{ steps.image-tag.outputs.tag }}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CONTAINER_IMAGE:${{ steps.image-tag.outputs.tag }}

  verify-deployment:
    name: Verify deployment (${{ github.ref_name }})
    needs:
      - build-and-test
      - build-and-push-images
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 18
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=production" >> $GITHUB_OUTPUT
            echo "ecr_repo=$CONTAINER_IMAGE" >> $GITHUB_OUTPUT
            echo "health_url=https://nodes-api.desci.com/health" >> $GITHUB_OUTPUT
            echo "env_url=https://nodes.desci.com" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "ecr_repo=$CONTAINER_IMAGE-dev" >> $GITHUB_OUTPUT
            echo "health_url=https://nodes-api-dev.desci.com/health" >> $GITHUB_OUTPUT
            echo "env_url=https://nodes-dev.desci.com" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/demo" ]]; then
            echo "name=demo" >> $GITHUB_OUTPUT
            echo "ecr_repo=$CONTAINER_IMAGE-demo" >> $GITHUB_OUTPUT
            echo "health_url=" >> $GITHUB_OUTPUT
            echo "env_url=https://nodes-demo.desci.com" >> $GITHUB_OUTPUT
          fi

      - name: Verify image exists in ECR
        id: verify-ecr
        run: |
          IMAGE_META=$(aws ecr describe-images \
            --repository-name ${{ steps.env.outputs.ecr_repo }} \
            --image-ids imageTag=${{ github.sha }} \
            --region $AWS_DEFAULT_REGION 2>&1)
          if [ $? -eq 0 ]; then
            echo "Image ${{ steps.env.outputs.ecr_repo }}:${{ github.sha }} verified in ECR"
            echo "$IMAGE_META" | jq '.imageDetails[0].imageTags'
          else
            echo "::error::Image not found in ECR: $IMAGE_META"
            exit 1
          fi

      - name: Tag image for Flux
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name ${{ steps.env.outputs.ecr_repo }} \
            --image-ids imageTag=${{ github.sha }} \
            --region $AWS_DEFAULT_REGION \
            --query 'images[0].imageManifest' --output text)
          for TAG in latest ${{ needs.build-and-push-images.outputs.image_tag }}; do
            OUTPUT=$(aws ecr put-image \
              --repository-name ${{ steps.env.outputs.ecr_repo }} \
              --image-tag "$TAG" \
              --image-manifest "$MANIFEST" \
              --region $AWS_DEFAULT_REGION 2>&1) || {
              if echo "$OUTPUT" | grep -q "ImageAlreadyExistsException"; then
                echo "Tag :$TAG already points to this digest — ok"
              else
                echo "::error::Failed to tag :$TAG — $OUTPUT"
                exit 1
              fi
            }
            echo "Tagged as :$TAG"
          done

      - name: Create GitHub Deployment
        id: create-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ steps.env.outputs.name }}',
              description: `desci-server:${{ needs.build-and-push-images.outputs.image_tag }}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: '${{ steps.env.outputs.name }}' === 'production',
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set deployment to in_progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Image in ECR, waiting for Flux to deploy...',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Wait for Flux to pick up image and pull
        run: |
          echo "Waiting 7 minutes for Flux pipeline + image pull..."
          echo "  - ImageRepository polls ECR every 1m"
          echo "  - ImageUpdateAutomation commits every 2m"
          echo "  - Kustomization reconciles every 1m"
          echo "  - Image pull + startup ~5 min (2.4GB image)"
          sleep 420

      - name: Poll health endpoint for deployed version
        id: health-check
        run: |
          EXPECTED_SHA="${{ github.sha }}"
          HEALTH_URL="${{ steps.env.outputs.health_url }}"

          if [[ -z "$HEALTH_URL" ]]; then
            echo "No health URL configured for ${{ steps.env.outputs.name }} — skipping verification"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          MAX_ATTEMPTS=20
          INTERVAL=15
          echo "Polling $HEALTH_URL for version=$EXPECTED_SHA"
          echo "Max wait: $((MAX_ATTEMPTS * INTERVAL))s ($MAX_ATTEMPTS attempts x ${INTERVAL}s)"
          echo ""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf --max-time 10 "$HEALTH_URL" 2>/dev/null || echo '{"error":"unreachable"}')
            CURRENT_VERSION=$(echo "$RESPONSE" | jq -r '.version // "unknown"' 2>/dev/null || echo "parse-error")
            echo "Attempt $i/$MAX_ATTEMPTS: version=$CURRENT_VERSION (want ${EXPECTED_SHA:0:12}...)"

            if [[ "$CURRENT_VERSION" == "$EXPECTED_SHA" ]]; then
              echo ""
              echo "Deployment verified! ${{ steps.env.outputs.name }} is running $EXPECTED_SHA"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [[ $i -lt $MAX_ATTEMPTS ]]; then
              sleep $INTERVAL
            fi
          done

          echo ""
          echo "::warning::Deployment not verified after $((MAX_ATTEMPTS * INTERVAL))s. Last version: $CURRENT_VERSION"
          echo "status=timeout" >> $GITHUB_OUTPUT

      - name: Set deployment status to success
        if: steps.health-check.outputs.status == 'success' || steps.health-check.outputs.status == 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const verified = '${{ steps.health-check.outputs.status }}' === 'success';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'success',
              description: verified
                ? 'Live on ${{ steps.env.outputs.name }} — verified via /health'
                : 'Image in ECR — no health endpoint to verify (demo)',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              environment_url: '${{ steps.env.outputs.env_url }}',
            });

      - name: Set deployment status to failure (timeout)
        if: steps.health-check.outputs.status == 'timeout'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment not verified — /health did not return expected SHA after 10 min',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            core.setFailed('Deployment verification timed out');

      - name: Set deployment status to failure (error)
        if: failure() && steps.create-deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed — check workflow logs',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
